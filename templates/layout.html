{{define "layout"}}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <meta name="description" content="n! — Comunidad de código y matemáticas de la Universidad Diego Portales">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
    <link rel="icon" href="data:,">
</head>

<body class="min-h-screen flex flex-col">
    <!-- Matrix rain background -->
    <div class="matrix-bg"></div>

    <!-- Navigation -->
    <nav class="navbar fixed top-0 left-0 w-full z-50">
        <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
            <!-- Logo -->
            <a href="/" class="flex items-center gap-3 group">
                <span class="font-[Orbitron] text-2xl font-black tracking-wider text-matrix-green glow-text transition-all duration-300 group-hover:drop-shadow-[0_0_15px_rgba(0,255,65,0.5)]">&lt;n!&gt;</span>
            </a>

            <!-- Desktop Nav -->
            <div class="hidden md:flex items-center gap-2">
                <a href="/" class="nav-link {{if eq .ActivePage "inicio"}}active{{end}}">Inicio</a>
                <a href="/blog" class="nav-link {{if eq .ActivePage "blog"}}active{{end}}">Blog</a>
                <a href="/contacto" class="nav-link {{if eq .ActivePage "contacto"}}active{{end}}">Contacto</a>
            </div>

            <!-- Mobile hamburger -->
            <button id="menuToggle" class="md:hidden text-matrix-green p-2" aria-label="Abrir menú">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
            </button>
        </div>

        <!-- Mobile menu -->
        <div id="mobileMenu" class="mobile-menu fixed top-0 right-0 h-full w-64 bg-matrix-dark border-l border-matrix-border z-50 flex flex-col p-6 md:hidden">
            <button id="menuClose" class="self-end text-matrix-green mb-8 p-2" aria-label="Cerrar menú">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
            <a href="/" class="nav-link py-3 {{if eq .ActivePage "inicio"}}active{{end}}">Inicio</a>
            <a href="/blog" class="nav-link py-3 {{if eq .ActivePage "blog"}}active{{end}}">Blog</a>
            <a href="/contacto" class="nav-link py-3 {{if eq .ActivePage "contacto"}}active{{end}}">Contacto</a>
        </div>
    </nav>

    <!-- Page content -->
    <main class="flex-1 pt-20">
        {{template "content" .}}
    </main>

    <!-- Footer -->
    <footer class="footer mt-auto">
        <div class="max-w-6xl mx-auto px-4 py-12">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-8">
                <!-- Navigation links -->
                <div>
                    <h4 class="font-[Orbitron] text-sm uppercase tracking-widest text-matrix-green mb-4 glow-text-sm">Navegación</h4>
                    <div class="flex flex-col gap-2">
                        <a href="/" class="footer-link text-sm font-[Share_Tech_Mono]">> Inicio</a>
                        <a href="/blog" class="footer-link text-sm font-[Share_Tech_Mono]">> Blog</a>
                        <a href="/contacto" class="footer-link text-sm font-[Share_Tech_Mono]">> Contacto</a>
                    </div>
                </div>

                <!-- Social -->
                <div>
                    <h4 class="font-[Orbitron] text-sm uppercase tracking-widest text-matrix-green mb-4 glow-text-sm">Redes</h4>
                    <div class="flex gap-4">
                        <!-- Instagram -->
                        <a href="#" class="footer-link group" aria-label="Instagram">
                            <svg class="w-6 h-6 transition-all duration-300 group-hover:drop-shadow-[0_0_8px_rgba(0,255,65,0.5)]" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
                            </svg>
                        </a>
                        <!-- GitHub -->
                        <a href="#" class="footer-link group" aria-label="GitHub">
                            <svg class="w-6 h-6 transition-all duration-300 group-hover:drop-shadow-[0_0_8px_rgba(0,255,65,0.5)]" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                            </svg>
                        </a>
                    </div>
                </div>

                <!-- Logos -->
                <div>
                    <h4 class="font-[Orbitron] text-sm uppercase tracking-widest text-matrix-green mb-4 glow-text-sm">Organización</h4>
                    <div class="flex items-center gap-6">
                        <span class="font-[Orbitron] text-3xl font-black tracking-wider text-matrix-green glow-text transition-all duration-300 hover:drop-shadow-[0_0_15px_rgba(0,255,65,0.5)] cursor-default">&lt;n!&gt;</span>
                        <span class="text-matrix-green-dark text-xl font-[Share_Tech_Mono]">|</span>
                        <span class="font-[Orbitron] text-2xl font-bold tracking-widest text-red-500 transition-all duration-300 hover:drop-shadow-[0_0_15px_rgba(255,50,50,0.5)] cursor-default" style="text-shadow: 0 0 7px rgba(255,50,50,0.4), 0 0 15px rgba(255,50,50,0.2);">UDP</span>
                    </div>
                </div>
            </div>

            <div class="matrix-divider mb-6"></div>

            <div class="text-center">
                <p class="text-matrix-green-dark text-xs font-[Share_Tech_Mono] tracking-wider">
                    &copy; 2026 n! — Comunidad de Código y Matemáticas — Universidad Diego Portales
                </p>
                <p class="text-matrix-green-dark text-xs font-[Share_Tech_Mono] mt-1 animate-pulse-glow">
                    [ SYSTEM ONLINE ]
                </p>
            </div>
        </div>
    </footer>

    <!-- Mobile menu script -->
    <script>
        const menuToggle = document.getElementById('menuToggle');
        const menuClose = document.getElementById('menuClose');
        const mobileMenu = document.getElementById('mobileMenu');

        if (menuToggle && mobileMenu && menuClose) {
            menuToggle.addEventListener('click', () => mobileMenu.classList.add('open'));
            menuClose.addEventListener('click', () => mobileMenu.classList.remove('open'));
        }
    </script>
</body>
</html>
{{end}}
